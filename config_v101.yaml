# FDO Client Configuration

# Basic settings
blob_path: "cred.bin"
debug: true
fdo_version: 101

# Device Initialization (DI) settings
di:
  url: "http://127.0.0.1:9999"
  key: "ec384"
  key_enc: "x509"

# Cryptographic settings
crypto:
  cipher_suite: "A128GCM"
  kex_suite: "ECDH384"

# Transport settings
transport:
  insecure_tls: true
  tpm_path: ""

# Operation settings
operation:
  print_device: false
  rv_only: false

# Service Info Modules
service_info:
  download_dir: ""
  echo_commands: false
  wget_dir: ""
  upload_paths: []

# FDO_SYS module (Java owner service compatibility)
fdo_sys:
  enabled: true
  output_dir: "/hzp"
  csr_subject_cn: "mtls.edge.internal.use.only"
  # Set ssh_username to enable SSH credential provisioning.
  # The CSR will be wrapped in a JSON envelope and the owner service
  # will generate an SSH keypair, push authorized_keys to the device,
  # and write connection-info to the NativeEdge secrets store.
  ssh_username: "root"
